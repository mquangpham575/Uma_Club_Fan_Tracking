name: Daily Uma Tracker Update

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [external-cron]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Create Google Credentials File
        env:
          GCP_CREDS: ${{ secrets.GCP_CREDENTIALS }}
          ONLYREX_CREDS: ${{ secrets.ONLYREX_CREDENTIALS }}
        run: |
          mkdir -p config
          echo "$GCP_CREDS" > config/credentials.json
          mkdir -p OnlyRex
          echo "$ONLYREX_CREDS" > OnlyRex/credentials.json

      # Consolidated Update Phase
      - name: Update Tracker
        uses: nick-fields/retry@v3
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          CHRONO_API_KEY: ${{ secrets.CHRONO_API_KEY }}
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 15
          command: uv run python src/main.py --cron --engine chrono

      - name: Update OnlyRex
        uses: nick-fields/retry@v3
        env:
          CHRONO_API_KEY: ${{ secrets.CHRONO_API_KEY }}
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 15
          command: uv run python OnlyRex/only_rex_tracker.py --cron
