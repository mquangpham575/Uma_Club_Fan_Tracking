name: Daily Uma Tracker Update

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [external-cron]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Create Google Credentials File
        env:
          GCP_CREDS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          mkdir -p config
          echo "$GCP_CREDS" > config/credentials.json

      - name: Install virtual display
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Phase 1: Browser Scraping (The heavy work)
      - name: Scrape via Chrono
        uses: nick-fields/retry@v3
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 15
          command: xvfb-run --auto-servernum uv run python src/main.py --cron --engine chrono --scrape-only

      # Phase 2: Sheet Synchronization (The safe work)
      - name: Sync to Google Sheets
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: uv run python src/main.py --cron --engine chrono --sync-only

      - name: Commit and push data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add api_data/
          git commit -m "Auto-update tracked data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
