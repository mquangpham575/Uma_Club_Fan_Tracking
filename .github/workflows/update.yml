name: Daily Uma Tracker Update

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [external-cron]
  schedule:
    - cron: '2 15 * * *' # Runs at 15:02 UTC daily
  workflow_dispatch: # Allows running it manually from the UI and via API

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Create Google Credentials File
        env:
          GCP_CREDS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          mkdir -p config
          echo "$GCP_CREDS" > config/credentials.json

      - name: Install virtual display
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Retry the tracker run upon failure to improve robustness
      - name: Run Tracker
        uses: nick-fields/retry@v3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 15
          command: xvfb-run --auto-servernum uv run python src/main.py --cron --engine chrono
          
      - name: Commit and push data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add api_data/
          git commit -m "Auto-update tracked data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
